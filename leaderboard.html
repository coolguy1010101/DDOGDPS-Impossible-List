<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - YOUR GDPS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-black via-zinc-950 to-black">
  <div class="max-w-7xl mx-auto p-6">
    <a href="index.html" class="inline-flex items-center gap-2 text-cyan-400 mb-8 hover:text-cyan-300"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h1 class="text-5xl font-bold tracking-widest text-cyan-400 mb-12">PLAYER LEADERBOARD</h1>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-zinc-700 text-cyan-300">
            <th class="p-4">#</th>
            <th class="p-4">Player</th>
            <th class="p-4">Demons Beaten</th>
            <th class="p-4">Points</th>
          </tr>
        </thead>
        <tbody class="text-lg">
          <tr class="border-b border-zinc-800"><td class="p-6 font-bold text-cyan-400">1</td><td class="p-6 font-bold">Test</td><td class="p-6">1</td><td class="p-6 text-emerald-400">100</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
