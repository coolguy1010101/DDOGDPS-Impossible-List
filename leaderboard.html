<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - YOUR GDPS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-black via-zinc-950 to-black">
  <div class="max-w-7xl mx-auto p-6">
    <a href="index.html" class="inline-flex items-center gap-2 text-cyan-400 mb-8 hover:text-cyan-300"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h1 class="text-5xl font-bold tracking-widest text-cyan-400 mb-12">PLAYER LEADERBOARD</h1>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-zinc-700 text-cyan-300">
            <th class="p-4">#</th>
            <th class="p-4">Player</th>
            <th class="p-4">Demons</th>
            <th class="p-4">Points</th>
          </tr>
        </thead>
        <tbody id="leaderTable" class="text-lg"></tbody>
      </table>
    </div>
  </div>

  <script>
    const supabase = Supabase.createClient("https://cqhnkdoidpbixmnhouxf.supabase.co", "sb_publishable_2WTz2wfwDg-AolNHObFsFQ_NCUt0k5i");

    async function renderLeaderboard() {
      const { data } = await supabase.from('demons').select('verifier');
      const players = {};
      data.forEach(d => {
        players[d.verifier] = (players[d.verifier] || 0) + 1;
      });
      const sorted = Object.entries(players).sort((a,b) => b[1] - a[1]);
      const tbody = document.getElementById('leaderTable');
      tbody.innerHTML = sorted.map((p,i) => `
        <tr class="border-b border-zinc-800">
          <td class="p-6 font-bold text-cyan-400">${i+1}</td>
          <td class="p-6 font-bold">${p[0]}</td>
          <td class="p-6">${p[1]}</td>
          <td class="p-6 text-emerald-400">${p[1] * 100}</td>
        </tr>
      `).join('');
    }
    renderLeaderboard();
  </script>
</body>
</html>
