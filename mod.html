<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOD PANEL - YOUR GDPS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-black via-zinc-950 to-black p-6">
  <a href="index.html" class="text-cyan-400 mb-8 inline-flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back</a>
  <h1 class="text-5xl font-bold text-red-400 mb-8">MOD PANEL</h1>

  <div id="pendingContainer"></div>
</body>
<script>
  const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
  const SUPABASE_ANON = "YOUR_ANON_KEY_HERE";

  const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  async function loadPending() {
    const { data } = await supabase.from('pending').select('*');
    const container = document.getElementById('pendingContainer');
    container.innerHTML = data.length === 0 ? '<p class="text-zinc-500">No pending records</p>' : data.map(p => `
      <div class="bg-zinc-900 p-6 rounded-3xl mb-4 flex justify-between">
        <div><b>${p.player}</b> on <span class="text-cyan-400">${p.level}</span><br>
        <a href="${p.video}" target="_blank" class="text-xs text-cyan-300">proof</a></div>
        <div>
          <button onclick="acceptRecord(${p.id})" class="bg-green-500 px-6 py-3 rounded-xl mr-2">✅ ACCEPT + SET POSITION</button>
          <button onclick="denyRecord(${p.id})" class="bg-red-500 px-6 py-3 rounded-xl">❌ DENY</button>
        </div>
      </div>
    `).join('');
  }

  async function acceptRecord(id) {
    const pos = prompt("Enter the leaderboard position for this record (number):");
    if (!pos) return;

    const { data } = await supabase.from('pending').select('*').eq('id', id).single();
    await supabase.from('demons').insert({ pos: parseInt(pos), level: data.level, creator: "Unknown", verifier: data.player, video: data.video });
    await supabase.from('pending').delete().eq('id', id);
    alert(`✅ Added at position #${pos}!`);
    loadPending();
  }

  async function denyRecord(id) {
    await supabase.from('pending').delete().eq('id', id);
    alert("❌ Denied");
    loadPending();
  }

  loadPending();
</script>
</html>
